<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🎵 hajime Songs</title>
<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/svg+xml" href="drink.svg">

<meta property="og:title" content="🦊🍺🎵 hajime Song List">
<meta property="og:description" content="配信で歌った楽曲をまとめたリスト">
<meta property="og:image" content="https://yourdomain.com/og.png">
<meta property="og:url" content="https://yourdomain.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>

<h1>🦊💙🎵 hajime Song List 🎵🍺🦊</h1>

<div class="tabs">
  <button class="tab-button active" onclick="showTab('songs', this)">曲一覧</button>
  <button class="tab-button" onclick="showTab('streams', this)">配信一覧</button>
  <button class="tab-button" onclick="showTab('artists', this)">アーティスト別</button>
</div>

<div id="songs" class="section">

  <div class="summary-row-wrap">
  
    <div class="summary" id="songsSummary"></div>
  
    <div class="filter-area">
      <div class="global-filter">
        <span class="filter-label">🎵全曲</span>
        <label class="toggle">
          <input type="checkbox" class="monetizedToggle">
          <span class="slider"></span>
        </label>
        <span class="filter-label">📌収益化後のみ（リクエスト用）</span>
      </div>
  
      <div class="filter-message">
        　※音源の関係で歌えない曲があるかもしれないので、<br>
        　　リクエストを通したい場合は絞り込み推奨
      </div>
    </div>
  
  </div>

  <div class="toolbar">
    <input id="searchSongs" placeholder="曲・アーティスト検索">
    <select id="sortSongsType">
      <option value="title">曲名</option>
      <option value="artist">アーティスト</option>
      <option value="count">回数</option>
    </select>
    <select id="sortSongsOrder">
      <option value="asc">昇順</option>
      <option value="desc">降順</option>
    </select>

    <div class="theme-switch">
      <span class="theme-label">🌙 ダーク</span>
      <label class="toggle">
        <input type="checkbox" id="themeToggleSongs">
        <span class="slider"></span>
      </label>
      <span class="theme-label">☀️ ライト</span>
    </div>
  </div>

  <table id="songsTable">
    <thead>
      <tr><th>曲名</th><th>アーティスト</th><th>回数</th><th>再生 (最新)</th></tr>
    </thead>
    <tbody id="songsBody"></tbody>
  </table>
</div>

<div id="streams" class="section hidden">

  <div class="summary-row-wrap">
  
    <div class="summary" id="streamsSummary"></div>
  
    <div class="filter-area">
      <div class="global-filter">
        <span class="filter-label">🎵全曲</span>
        <label class="toggle">
          <input type="checkbox" class="monetizedToggle">
          <span class="slider"></span>
        </label>
        <span class="filter-label">📌収益化後のみ（リクエスト用）</span>
      </div>
  
      <div class="filter-message">
        　※音源の関係で歌えない曲があるかもしれないので、<br>
        　　リクエストを通したい場合は絞り込み推奨
      </div>
    </div>
  
  </div>

  <div class="toolbar">
    <input id="searchStreams" placeholder="曲・アーティスト検索">
    <select id="sortStreamsOrder">
      <option value="desc">新しい順</option>
      <option value="asc">古い順</option>
    </select>
    <div class="theme-switch">
      <span class="theme-label">🌙 ダーク</span>
      <label class="toggle">
        <input type="checkbox" id="themeToggleStreams">
        <span class="slider"></span>
      </label>
      <span class="theme-label">☀️ ライト</span>
    </div>
  </div>

  <div id="streamsContainer"></div>
</div>

<div id="artists" class="section hidden">

  <div class="summary-row-wrap">
  
   <div class="summary" id="artistsSummary"></div>
  
    <div class="filter-area">
      <div class="global-filter">
        <span class="filter-label">🎵全曲</span>
        <label class="toggle">
          <input type="checkbox" class="monetizedToggle">
          <span class="slider"></span>
        </label>
        <span class="filter-label">📌収益化後のみ（リクエスト用）</span>
      </div>
  
      <div class="filter-message">
        　※音源の関係で歌えない曲があるかもしれないので、<br>
        　　リクエストを通したい場合は絞り込み推奨
      </div>
    </div>
  
  </div>
  
  <div class="toolbar">
    <input id="searchArtists" placeholder="曲・アーティスト検索">

    <select id="sortArtistsType">
      <option value="name">アーティスト名</option>
      <option value="count">曲数</option>
    </select>

    <select id="sortArtistsOrder">
      <option value="asc">昇順</option>
      <option value="desc">降順</option>
    </select>

    <div class="theme-switch">
      <span class="theme-label">🌙 ダーク</span>
      <label class="toggle">
        <input type="checkbox" id="themeToggleArtists">
        <span class="slider"></span>
      </label>
      <span class="theme-label">☀️ ライト</span>
    </div>
  </div>

  <table id="artistsTable">
  
    <colgroup>
      <col style="width:15%">
      <col style="width:85%">
    </colgroup>
  
    <tbody id="artistsBody"></tbody>
  </table>
</div>

<div id="modal" class="hidden">
  <div class="modal-content">
    <div id="player"></div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
