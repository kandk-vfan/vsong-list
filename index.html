<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🦊💙🎵 hajime Songs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🦊💙🎵 hajime Song List</h1>

<div class="controls">
  <button onclick="showTab('songs')">曲一覧</button>
  <button onclick="showTab('streams')">配信一覧</button>
  <button onclick="showTab('artists')">アーティスト</button>

  <input id="search" placeholder="検索">

  <select id="sort">
    <option value="title_asc">曲名 ↑</option>
    <option value="title_desc">曲名 ↓</option>
    <option value="artist_asc">アーティスト ↑</option>
    <option value="artist_desc">アーティスト ↓</option>
    <option value="count_desc">回数 ↓</option>
    <option value="count_asc">回数 ↑</option>
  </select>

  <button onclick="toggleDark()">🌙</button>
</div>

<!-- 曲一覧 -->
<div id="songs">
<table>
  <thead>
    <tr>
      <th>曲名</th>
      <th>アーティスト</th>
      <th>回数</th>
      <th>再生</th>
    </tr>
  </thead>
  <tbody id="songsBody"></tbody>
</table>
</div>

<!-- 配信一覧 -->
<div id="streams" class="hidden">
<table>
  <thead>
    <tr>
      <th>配信</th>
      <th>曲一覧</th>
    </tr>
  </thead>
  <tbody id="streamsBody"></tbody>
</table>
</div>

<!-- アーティスト -->
<div id="artists" class="hidden">
<table>
  <thead>
    <tr>
      <th>アーティスト</th>
      <th>曲</th>
      <th>回数</th>
    </tr>
  </thead>
  <tbody id="artistsBody"></tbody>
</table>
</div>

<div id="modal" class="hidden">
  <div id="player"></div>
  <button onclick="closeModal()">閉じる</button>
</div>

<script src="app.js"></script>
</body>
</html>
