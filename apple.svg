<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Red apple">
  <defs>
    <linearGradient id="appleBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5a66"/>
      <stop offset="38%" stop-color="#ff1f2d"/>
      <stop offset="100%" stop-color="#c40018"/>
    </linearGradient>
    <linearGradient id="appleShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8b92" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff8b92" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fe35a"/>
      <stop offset="100%" stop-color="#1e9d33"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9c5a21"/>
      <stop offset="100%" stop-color="#5a2e12"/>
    </linearGradient>
  </defs>

  <!-- leaf -->
  <path d="M284 112
           C330 72, 397 74, 433 108
           C403 156, 339 176, 292 162
           C272 156, 262 134, 284 112Z"
        fill="url(#leafGrad)"/>
  <path d="M295 151 C330 124, 368 112, 411 109"
        fill="none" stroke="#166d24" stroke-width="8" stroke-linecap="round"/>

  <!-- stem -->
  <path d="M242 88
           C255 80, 274 84, 280 98
           L295 176
           C298 193, 286 208, 268 208
           C251 208, 238 196, 240 180
           L231 104
           C230 96, 235 91, 242 88Z"
        fill="url(#stemGrad)"/>

  <!-- top dimple shadow -->
  <ellipse cx="262" cy="176" rx="78" ry="24" fill="#9b0015" opacity="0.55"/>

  <!-- apple body -->
  <path d="M251 138
           C197 112, 128 128, 92 184
           C60 234, 58 313, 89 376
           C122 442, 177 470, 219 455
           C243 447, 270 447, 294 455
           C336 469, 391 443, 424 376
           C455 313, 453 234, 421 184
           C385 128, 316 112, 261 138
           C258 140, 254 140, 251 138Z"
        fill="url(#appleBody)"/>

  <!-- soft highlight -->
  <path d="M146 194
           C165 162, 209 149, 245 162
           C203 171, 167 198, 151 236
           C138 266, 135 300, 144 332
           C117 299, 118 239, 146 194Z"
        fill="white" opacity="0.22"/>

  <!-- large emoji-like shine -->
  <path d="M141 179
           C160 150, 196 140, 223 151
           C201 155, 176 171, 162 196
           C149 219, 146 245, 151 267
           C127 248, 123 208, 141 179Z"
        fill="white" opacity="0.92"/>

  <!-- small shine -->
  <ellipse cx="226" cy="198" rx="22" ry="14" fill="white" opacity="0.95"/>

  <!-- bottom glossy sweep -->
  <path d="M158 324
           C205 366, 289 372, 347 326
           C328 356, 292 385, 245 392
           C209 397, 176 384, 158 324Z"
        fill="#ff7d85" opacity="0.22"/>

  <!-- bottom edge shine left -->
  <path d="M181 386
           C202 403, 219 411, 241 414"
        fill="none" stroke="#ff98a0" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- bottom edge shine right -->
  <path d="M311 394
           C337 401, 360 399, 382 383"
        fill="none" stroke="#ff98a0" stroke-width="10" stroke-linecap="round" opacity="0.72"/>

  <!-- inner contour shadow -->
  <path d="M368 194
           C395 231, 400 289, 380 336
           C365 372, 337 401, 302 418"
        fill="none" stroke="#9e0012" stroke-width="14" stroke-linecap="round" opacity="0.35"/>
</svg>
