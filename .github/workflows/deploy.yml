name: deploy multi branches to pages

on:
  workflow_run:
    workflows: ["convert txt to json"]
    types:
      - completed

  push:
    branches:
      - hjm
      - kawaui
    paths-ignore:
      - "songs.txt"

jobs:
  deploy:
    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'hjm' ||
          github.event.workflow_run.head_branch == 'kawaui'
        )
      )
      ||
      (
        github.event_name == 'push'
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: prepare workspace
        run: mkdir public

      - name: create root index
        run: |
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <title>TOP</title>
          </head>
          <body>
            <h1>TOPページ</h1>
          </body>
          </html>
          EOF

      - uses: actions/checkout@v4
        with:
          ref: hjm
          path: tmp-hjm

      - run: |
          mkdir -p public/hjm
          rsync -av --exclude='.git' --exclude='.github' tmp-hjm/ public/hjm/

      - uses: actions/checkout@v4
        with:
          ref: kawaui
          path: tmp-kawaui

      - run: |
          mkdir -p public/kawaui
          rsync -av --exclude='.git' --exclude='.github' tmp-kawaui/ public/kawaui/

      - name: deploy
        run: |
          cd public
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "deploy"

          git branch -M gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git push -f origin gh-pages
